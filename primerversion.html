<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primera Página</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #007bff;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h1>¡Hola, Mundo!</h1>
    <p> Git fue creado pensando en la eficiencia y la confiabilidad del mantenimiento de versiones...</p>
    
    <hr>

 
    <button onclick="saludar()">¡Hazme clic!</button>

    <script>
        function saludar() {
            alert('¡Hola! Gracias por hacer clic.');
        }
    </script>

</body>
</html>
